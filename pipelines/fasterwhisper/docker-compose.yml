services:
  diarization:
    image: fasterwhisper-diarization:latest
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - AUDIO_FILE=${AUDIO_FILE:-/app/audio/sample3.mp3}
      - LANGUAGE=${LANGUAGE:-}
      - MIN_SPEAKERS=${MIN_SPEAKERS:-2}
      - MAX_SPEAKERS=${MAX_SPEAKERS:-2}
      - TZ=Asia/Karachi
      - HF_HOME=/app/.cache/huggingface
      - TORCH_HOME=/app/.cache/torch
    volumes:
      # Support both direct host paths and relative paths
      - ${AUDIO_PATH:-../../data/audio}:/app/audio:ro
      - ${RESULTS_PATH:-../../results}:/app/results
      # Model caches
      - ${CACHE_PATH:-../../.cache}/huggingface:/app/.cache/huggingface
      - ${CACHE_PATH:-../../.cache}/torch:/app/.cache/torch
    working_dir: /app
    command: python run_diarization.py
