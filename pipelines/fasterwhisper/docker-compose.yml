services:
  diarization:
    build: .
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - AUDIO_FILE=${AUDIO_FILE:-/app/audio/sample3.mp3}
      - LANGUAGE=${LANGUAGE:-}
      - MIN_SPEAKERS=${MIN_SPEAKERS:-2}
      - MAX_SPEAKERS=${MAX_SPEAKERS:-2}
      - TZ=Asia/Karachi
      - HF_HOME=/app/.cache/huggingface
    volumes:
      # Relative paths (from pipelines/fasterwhisper/)
      - ../../data/audio:/app/audio:ro
      - ./output:/app/output
      # Model caches - use ${HOME} for user's home directory
      - ../../.cache/huggingface:/app/.cache/huggingface
      - ${HOME}/.cache/torch:/app/.cache/torch
    working_dir: /app
    command: python run_diarization.py
