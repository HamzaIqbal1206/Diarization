services:
  whisperx-diarization:
    build: .
    container_name: whisperx-diarization
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - AUDIO_FILE=/app/audio/sample3.mp3
      - WHISPERX_MODEL=small
      - LANGUAGE=en
      - MIN_SPEAKERS=2
      - MAX_SPEAKERS=2
    volumes:
      - ../../data/audio:/app/audio:ro
      - ./output:/app/output
    working_dir: /app
    command: python run_diarization.py
