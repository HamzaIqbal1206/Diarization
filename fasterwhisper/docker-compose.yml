services:
  diarization:
    build: .
    container_name: whisper-diarization
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - AUDIO_FILE=/app/audio/sample3.mp3
      - OUTPUT_FILE=/app/output/diarized_transcript.txt
    volumes:
      # Mount current directory for audio files
      - ./:/app/audio:ro
      # Mount output directory
      - ./output:/app/output
    working_dir: /app
    command: python run_diarization.py
    # For GPU support (uncomment if you have NVIDIA GPU)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
