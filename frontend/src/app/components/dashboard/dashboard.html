<div class="dashboard">
  <div class="left-panel">
    <!-- Upload Section -->
    <section class="card">
      <h2>Upload Audio</h2>
      <app-upload (fileUploaded)="onFileUploaded($event)" />
    </section>

    <!-- Configuration Section -->
    <section class="card">
      <h2>Pipeline Configuration</h2>

      <div class="form-group">
        <label for="audioFile">Audio File</label>
        <select id="audioFile" [(ngModel)]="selectedFile">
          @for (file of audioFiles; track file) {
            <option [value]="file">{{ file }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="pipeline">Pipeline</label>
        <select id="pipeline" [(ngModel)]="pipeline">
          <option value="fasterwhisper">Faster Whisper</option>
          <option value="whisperx">WhisperX</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="minSpeakers">Min Speakers</label>
          <input id="minSpeakers" type="number" min="1" max="20" [(ngModel)]="minSpeakers" />
        </div>
        <div class="form-group">
          <label for="maxSpeakers">Max Speakers</label>
          <input id="maxSpeakers" type="number" min="1" max="20" [(ngModel)]="maxSpeakers" />
        </div>
      </div>

      <div class="form-group">
        <label for="hfToken">HuggingFace Token</label>
        <input id="hfToken" type="password" placeholder="hf_..." [(ngModel)]="hfToken" />
      </div>

      <button class="btn-primary" (click)="runPipeline()" [disabled]="jobStatus === 'running' || !selectedFile">
        @if (jobStatus === 'running') {
          Running...
        } @else {
          Run Diarization
        }
      </button>

      @if (jobError) {
        <div class="error-msg">{{ jobError }}</div>
      }
    </section>

  </div>

  <div class="right-panel">
    <app-transcript [segments]="segments" [status]="jobStatus" />

    <!-- Existing Transcripts -->
    <section class="card">
      <h2>Previous Transcripts</h2>
      @if (existingTranscripts.length === 0) {
        <p class="muted">No transcripts yet.</p>
      }
      <ul class="transcript-list">
        @for (t of existingTranscripts; track t.filename) {
          <li (click)="viewTranscript(t.pipeline, t.filename)">
            <span class="badge">{{ t.pipeline }}</span>
            {{ t.filename }}
          </li>
        }
      </ul>
    </section>
  </div>
</div>
