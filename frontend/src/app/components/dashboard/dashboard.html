<div class="dashboard">
  <div class="left-panel">
    <!-- Upload Section -->
    <section class="card">
      <h2>Upload Audio</h2>
      <app-upload (fileUploaded)="onFileUploaded($event)" />
    </section>

    <!-- Configuration Section -->
    <section class="card">
      <h2>Pipeline Configuration</h2>

      <div class="form-group">
        <label for="audioFile">Audio File</label>
        <select id="audioFile" [(ngModel)]="selectedFile">
          @for (file of audioFiles; track file) {
            <option [value]="file">{{ file }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="pipeline">Pipeline</label>
        <select id="pipeline" [(ngModel)]="pipeline">
          <option value="fasterwhisper">Faster Whisper</option>
          <option value="whisperx">WhisperX</option>
        </select>
      </div>

      <div class="form-group">
        <label for="language">Language</label>
        <select id="language" [(ngModel)]="language">
          <option [value]="null">Auto Detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="nl">Dutch</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="tr">Turkish</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
          <option value="vi">Vietnamese</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="minSpeakers">Min Speakers</label>
          <input id="minSpeakers" type="number" min="1" max="20" [ngModel]="minSpeakers" (ngModelChange)="minSpeakers = $event || null" placeholder="Auto" />
        </div>
        <div class="form-group">
          <label for="maxSpeakers">Max Speakers</label>
          <input id="maxSpeakers" type="number" min="1" max="20" [ngModel]="maxSpeakers" (ngModelChange)="maxSpeakers = $event || null" placeholder="Auto" />
        </div>
      </div>

      <button class="btn-primary" (click)="runPipeline()" [disabled]="jobStatus === 'running' || !selectedFile">
        @if (jobStatus === 'running') {
          Running...
        } @else {
          Run Diarization
        }
      </button>

      @if (jobError) {
        <div class="error-msg">{{ jobError }}</div>
      }
    </section>

  </div>

  <div class="right-panel">
    <app-transcript [segments]="segments" [status]="jobStatus" [progress]="jobProgress" [filename]="transcriptFilename" [rawTranscript]="rawTranscript" />

    <!-- Existing Transcripts -->
    <section class="card">
      <h2>Previous Transcripts</h2>
      @if (existingTranscripts.length === 0) {
        <p class="muted">No transcripts yet.</p>
      }
      <ul class="transcript-list">
        @for (t of existingTranscripts; track t.filename) {
          <li (click)="viewTranscript(t.pipeline, t.filename)">
            <span class="badge">{{ t.pipeline }}</span>
            {{ t.filename }}
          </li>
        }
      </ul>
    </section>
  </div>
</div>
