<input
  #fileInput
  type="file"
  accept=".mp3,.wav,.m4a,.flac,.ogg,.aac,.aiff"
  hidden
  multiple
  (change)="onFileSelected($event)"
/>
<div
  class="drop-zone"
  [class.drag-over]="dragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  @if (uploading) {
    <p>Uploading {{ uploadProgress }}/{{ totalFiles }}...</p>
  } @else {
    <p>Drop audio files here or <strong>click to browse</strong></p>
    <span class="formats">mp3, wav, m4a, flac, ogg, aac, aiff (multiple allowed)</span>
  }
</div>
